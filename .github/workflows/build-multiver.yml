name: build (multiversion)
on:
  release:
    types: [created]

jobs:
    build_1_21:
        if: "!startsWith(github.event.head_commit.message, '[skip]')"
        strategy:
            matrix:
                java: [ 21 ]
        runs-on: ubuntu-latest
        steps:
            - name: steal code from repository
              uses: actions/checkout@v4

            - name: setup jdk ${{ matrix.java }}
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ matrix.java }}

            - name: cache gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/loom-cache
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
                  restore-keys: ${{ runner.os }}-gradle

            - name: give gradle permission to murder github servers
              run: chmod +x ./gradlew

            - name: gradle murders github servers
              run: ./gradlew assemble -PmcVer="1.21.1"

            - name: Publish Fabric
              env:
                MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                CURSEFORGE_TOKEN: ${{ secrets.CF_API_TOKEN }}
                MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
              run: ./gradlew -PmcVer="1.21.1" :fabric:build :fabric:publish :fabric:publishMods

            - name: Publish NeoForge
              env:
                MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
                CURSEFORGE_TOKEN: ${{ secrets.CF_API_TOKEN }}
                MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
              run: ./gradlew -PmcVer="1.21.1" :neoforge:build :neoforge:publish :neoforge:publishMods
